<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ROS Joystick Test</title>
  <style>
    .joystick-area {
      width: 120px;
      height: 120px;
      background: #eee;
      border-radius: 50%;
      position: relative;
      border: 3px solid #667eea;
      user-select: none;
    }

    .joystick-knob {
      width: 40px;
      height: 40px;
      background: #ff6b35;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #status, #debug {
      font-family: monospace;
      margin: 5px;
    }
  </style>
</head>
<body>

<h3 id="status">Connecting...</h3>
<div id="debug">Awaiting joystick input...</div>

<div class="joystick-area" id="joystickArea">
  <div class="joystick-knob" id="joystickKnob"></div>
</div>

<script>
let ws;

function connectWebSocket() {
  ws = new WebSocket('ws://192.168.0.103:9090');

  ws.onopen = () => {
    document.getElementById('status').innerText = '✅ Connected to ROS bridge';
  };

  ws.onclose = () => {
    document.getElementById('status').innerText = '❌ Disconnected from ROS bridge';
  };

  ws.onerror = (err) => {
    console.error('WebSocket error:', err);
  };
}

function sendTwist(linear_x, angular_z) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    const msg = {
      op: "publish",
      topic: "/rviz_joy_vel",
      msg: {
        linear: { x: linear_x, y: 0, z: 0 },
        angular: { x: 0, y: 0, z: angular_z }
      }
    };
    ws.send(JSON.stringify(msg));
    document.getElementById('debug').innerText = 
      `Sent linear.x=${linear_x.toFixed(2)}, angular.z=${angular_z.toFixed(2)}`;
  }
}

// Virtual Joystick
class VirtualJoystick {
  constructor(container, knob) {
    this.container = container;
    this.knob = knob;
    this.maxDistance = 40;
    this.centerX = container.clientWidth / 2;
    this.centerY = container.clientHeight / 2;
    this.isDragging = false;

    this.knob.addEventListener('mousedown', this.startDrag.bind(this));
    document.addEventListener('mousemove', this.drag.bind(this));
    document.addEventListener('mouseup', this.stopDrag.bind(this));

    this.knob.addEventListener('touchstart', this.startDrag.bind(this));
    document.addEventListener('touchmove', this.drag.bind(this), { passive: false });
    document.addEventListener('touchend', this.stopDrag.bind(this));
  }

  startDrag(e) {
    this.isDragging = true;
    e.preventDefault();
  }

  drag(e) {
    if (!this.isDragging) return;

    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let rect = this.container.getBoundingClientRect();

    let x = clientX - rect.left - this.centerX;
    let y = clientY - rect.top - this.centerY;

    const distance = Math.sqrt(x * x + y * y);
    if (distance > this.maxDistance) {
      const angle = Math.atan2(y, x);
      x = Math.cos(angle) * this.maxDistance;
      y = Math.sin(angle) * this.maxDistance;
    }

    this.knob.style.transform = `translate(${x + this.centerX - 20}px, ${y + this.centerY - 20}px)`;

    // Normalize
    const normX = x / this.maxDistance;
    const normY = -y / this.maxDistance;
    sendTwist(normY * 0.5, normX * 0.5); // scale speed
  }

  stopDrag() {
    if (!this.isDragging) return;
    this.isDragging = false;
    this.knob.style.transform = 'translate(-50%, -50%)';
    this.knob.style.transition = 'all 0.2s ease-out';


    sendTwist(0, 0);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  connectWebSocket();
  const area = document.getElementById('joystickArea');
  const knob = document.getElementById('joystickKnob');
  new VirtualJoystick(area, knob);
});
</script>

</body>
</html>
