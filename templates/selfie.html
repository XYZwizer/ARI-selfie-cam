<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie Camera</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .camera-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px auto;
            max-width: 640px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        #videoFeed {
            width: 100%;
            height: auto;
            min-height: 480px;
            display: block;
            background: #000;
        }
        
        .controls {
            margin: 30px 0;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 25px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .status {
            margin: 20px 0;
            font-size: 1.1em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Menu</a>
    
    <div class="container">
        <h1>📸 Take a Selfie</h1>
        
        <div class="camera-container" style="position:relative;">
            <img id="droidcam-stream" src="http://192.168.0.126:4747/video" alt="DroidCam Stream" crossorigin="anonymous" style="max-width:100%; border-radius:10px;">
            <canvas id="snapshot-canvas" style="display:none;"></canvas>
            <div id="countdown-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5em;font-weight:bold;color:white;text-shadow:2px 2px 8px #000;background:rgba(0,0,0,0.3);z-index:2;display:none;"></div>
        </div>
        
        <div class="status" id="status">Camera starting...</div>
    </div>

    <script>
    function showCountdown(seconds, onComplete) {
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'flex';
        let count = seconds;
        overlay.textContent = count;
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                overlay.textContent = count;
            } else {
                clearInterval(interval);
                overlay.style.display = 'none';
                onComplete();
            }
        }, 1000);
    }

    function capturePhoto() {
        const img = document.getElementById('droidcam-stream');
        const canvas = document.getElementById('snapshot-canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
        const dataURL = canvas.toDataURL('image/jpeg');
        document.getElementById('status').textContent = 'Uploading photo...';
        // Send to backend
        fetch('/api/take_selfie', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('status').textContent = 'Photo captured! Redirecting to gallery...';
                setTimeout(() => { window.location.href = '/gallery'; }, 1000);
            } else {
                document.getElementById('status').textContent = 'Error: ' + (data.error || 'Failed to capture photo');
            }
        })
        .catch(() => {
            document.getElementById('status').textContent = 'Error uploading photo';
        });
    }

    document.getElementById('droidcam-stream').onload = function() {
        document.getElementById('status').textContent = 'Camera ready! Smile for the selfie...';
        showCountdown(5, capturePhoto);
    };
    document.getElementById('droidcam-stream').onerror = function() {
        document.getElementById('status').textContent = 'Camera connection failed. Check DroidCam connection.';
    };
    window.addEventListener('beforeunload', function() {
        document.getElementById('droidcam-stream').src = '';
    });
    </script>
</body>
</html>
