{% extends "base.html" %}

{% block title %}Camera Server - Main Menu{% endblock %}

{% block content %}
<div class="container">
    <h1>📸 Camera Server</h1>
    <p style="font-size: 1.2em; margin-bottom: 40px; opacity: 0.9;">
        Welcome to the Raspberry Pi Camera Server
    </p>
    
    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <a href="/selfie" class="button primary" style="min-width: 200px;">

        <a href="/gallery" class="button primary" style="min-width: 200px;">

        </a>

    </p>
</div>
{% endblock %}
