{% extends "base.html" %}

{% block title %}Take a Selfie{% endblock %}

{% block content %}
<a href="/" class="button back-button">🏠 Home</a>

<div class="container">
    <h1>📸 Take a Selfie</h1>
    
    <div class="video-container" id="video-container">
        <img id="video-stream" class="video-stream" src="/api/selfie_stream" alt="Camera Stream">
        <div id="countdown-overlay" class="countdown-overlay hidden"></div>
    </div>
    
    <div style="margin-top: 30px;">
        <button id="capture-btn" class="button primary" onclick="startSelfieCountdown()">
            📷 Take Selfie
        </button>
    </div>
    
    <div id="status" style="margin-top: 20px; font-size: 1.1em;"></div>
    
    <div id="preview-container" class="hidden" style="margin-top: 30px;">
        <h3>Your Selfie:</h3>
        <img id="preview-image" class="preview-image" alt="Captured Selfie">
    </div>
</div>

<div id="flash-screen" class="flash-screen hidden">
    #issobellatherobot
</div>
{% endblock %}

{% block extra_js %}
<script>
let countdownActive = false;

function startSelfieCountdown() {
    if (countdownActive) return;
    
    const captureBtn = document.getElementById('capture-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const status = document.getElementById('status');
    const flashScreen = document.getElementById('flash-screen');
    
    countdownActive = true;
    captureBtn.disabled = true;
    captureBtn.textContent = 'Get Ready...';
    
    status.textContent = 'Get ready for your selfie!';
    
    // Start countdown from 6
    let count = 6;
    countdownOverlay.textContent = 'Ready?';
    countdownOverlay.classList.remove('hidden');
    
    const countdownInterval = setInterval(() => {
        if (count > 1) {
            count--;
            countdownOverlay.textContent = count;
        } else {
            clearInterval(countdownInterval);
            
            // Show flash screen for last second
            countdownOverlay.classList.add('hidden');
            flashScreen.classList.remove('hidden');
            
            // Take the photo after 1 second
            setTimeout(() => {
                takeSelfie();
                flashScreen.classList.add('hidden');
            }, 1000);
        }
    }, 1000);
}

async function takeSelfie() {
    const status = document.getElementById('status');
    const captureBtn = document.getElementById('capture-btn');
    const previewContainer = document.getElementById('preview-container');
    const previewImage = document.getElementById('preview-image');
    
    try {
        status.textContent = 'Taking selfie...';
        
        const response = await fetch('/api/take_selfie', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        const result = await response.json();
        
        if (result.success) {
            status.textContent = 'Selfie captured successfully!';
            
            // Show preview
            previewImage.src = `/gallery/${result.filename}`;
            previewContainer.classList.remove('hidden');
            
            // Flash the image on screen for 5 seconds
            setTimeout(() => {
                showMessage('Selfie saved to gallery!', 'success');
                
                // Reset after 5 seconds
                setTimeout(() => {
                    resetSelfieInterface();
                }, 5000);
            }, 500);
            
        } else {
            status.textContent = `Error: ${result.error}`;
            showMessage(result.error, 'error');
            resetSelfieInterface();
        }
        
    } catch (error) {
        status.textContent = `Error: ${error.message}`;
        showMessage('Failed to take selfie', 'error');
        resetSelfieInterface();
    }
}

function resetSelfieInterface() {
    const captureBtn = document.getElementById('capture-btn');
    const status = document.getElementById('status');
    const previewContainer = document.getElementById('preview-container');
    const countdownOverlay = document.getElementById('countdown-overlay');
    
    countdownActive = false;
    captureBtn.disabled = false;
    captureBtn.textContent = '📷 Take Selfie';
    status.textContent = '';
    previewContainer.classList.add('hidden');
    countdownOverlay.classList.add('hidden');
}

// Handle stream errors
document.getElementById('video-stream').onerror = function() {
    document.getElementById('status').textContent = 'Camera stream unavailable. Check camera connection.';
    showMessage('Camera not available', 'error');
};
</script>
{% endblock %}
