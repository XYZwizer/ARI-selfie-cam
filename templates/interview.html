{% extends "base.html" %}

{% block title %}Interview{% endblock %}

{% block content %}
<a href="/" class="button back-button">🏠 Home</a>

<div class="container">
    <h1>🎤 Interview</h1>
    
    <div class="question-container">
        <div class="question" id="interview-question">
            <!-- The prompt will be loaded here -->
        </div>
    </div>
    
    <div style="margin-top: 30px;">
        <button id="start-btn" class="button primary" onclick="startInterview()">
            🎬 Start Interview
        </button>
        
        <button id="stop-btn" class="button danger hidden" onclick="stopInterview()">
            ⏹️ Stop Interview
        </button>
    </div>
    
    <div id="status" style="margin-top: 20px; font-size: 1.1em;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let recording = false;

// Set up Server-Sent Events connection
const eventSource = new EventSource('/api/interview_events');

eventSource.onmessage = function(event) {
    try {
        const data = JSON.parse(event.data);
        console.log('Received interview event:', data);
        
        if (data.type === 'new_prompt') {
            // Update the question display
            document.getElementById('interview-question').textContent = data.data.prompt;
            showMessage('New interview question received!', 'info');
        }
        else if (data.type === 'start_interview') {
            // Remote start command from admin
            if (!recording) {
                showMessage('Starting interview remotely...', 'info');
                startInterview();
            }
        }
        else if (data.type === 'stop_interview') {
            // Remote stop command from admin
            if (recording) {
                showMessage('Stopping interview remotely...', 'info');
                stopInterview();
            }
        }
    } catch (e) {
        console.error('Error parsing event data:', e);
    }
};

eventSource.onerror = function(event) {
    console.error('EventSource failed:', event);
};

// Close connection when leaving page
window.addEventListener('beforeunload', function() {
    eventSource.close();
});

// Fetch and display the current interview prompt
async function loadPrompt() {
    try {
        const response = await fetch('/api/interview_prompt');
        const data = await response.json();
        document.getElementById('interview-question').textContent = data.prompt || '';
    } catch (e) {
        document.getElementById('interview-question').textContent = 'Prompt unavailable';
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadPrompt();
});

async function startInterview() {
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const status = document.getElementById('status');
    
    try {
        status.textContent = 'Starting interview...';
        startBtn.disabled = true;
        
        const response = await fetch('/api/start_interview', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        const result = await response.json();
        
        if (result.success) {
            recording = true;
            status.textContent = 'Interview recording started! Answer the question above.';
            
            // Switch interface
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            
            showMessage('Recording started!', 'success');
            
        } else {
            status.textContent = `Error: ${result.error}`;
            showMessage(result.error, 'error');
            startBtn.disabled = false;
        }
        
    } catch (error) {
        status.textContent = `Error: ${error.message}`;
        showMessage('Failed to start interview', 'error');
        startBtn.disabled = false;
    }
}

async function stopInterview() {
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const status = document.getElementById('status');
    
    try {
        status.textContent = 'Stopping interview...';
        stopBtn.disabled = true;
        
        const response = await fetch('/api/stop_interview', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        const result = await response.json();
        
        if (result.success) {
            recording = false;
            status.textContent = 'Interview completed and saved to gallery!';
            
            // Reset interface
            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.disabled = false;
            
            showMessage('Interview saved successfully!', 'success');
            
            // Auto-redirect to home page after 3 seconds
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
            
        } else {
            status.textContent = `Error: ${result.error}`;
            showMessage(result.error, 'error');
            stopBtn.disabled = false;
        }
        
    } catch (error) {
        status.textContent = `Error: ${error.message}`;
        showMessage('Failed to stop interview', 'error');
        stopBtn.disabled = false;
    }
}

// Handle page unload during recording
window.addEventListener('beforeunload', function(e) {
    if (recording) {
        e.preventDefault();
        e.returnValue = 'Recording in progress. Are you sure you want to leave?';
        return e.returnValue;
    }
});
</script>
{% endblock %}
