<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - Camera & ARI Robot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: #333;
        }
        .flash-screen.hidden {
            display: none !important;
        }

        .remote-preview img {
            max-width: 100%;
            height: auto;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
        }

        /* Joystick Control Section */
        .joystick-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .joystick-area {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            border-radius: 50%;
            position: relative;
            border: 3px solid #667eea;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            user-select: none;
        }

        .joystick-knob {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            border: 2px solid #fff;
            box-shadow: 0 3px 8px rgba(255, 140, 66, 0.4);
            transition: box-shadow 0.2s;
        }

        .joystick-knob:active {
            cursor: grabbing;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.6);
        }

        /* ARI Control Section */
        .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .motion-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .motion-btn {
            padding: 12px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .motion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* Camera Preview Section */
        .camera-preview {
            text-align: center;
            margin-bottom: 15px;
        }

        .preview-container {
            width: 100%;
            height: 240px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            border: 3px solid #667eea;
        }

        .preview-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 16px;
        }

        .preview-controls {
            display: flex;
            gap: 10px;
        }

        .preview-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-preview {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
        }

        .stop-preview {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
        }

        /* Navigation Section */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .nav-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .nav-btn.selfie {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
        }

        .nav-btn.interview {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }

        .nav-btn.gallery {
            background: linear-gradient(45deg, #feca57, #ff9ff3);
        }

        .nav-btn.home {
            background: linear-gradient(45deg, #5f27cd, #341f97);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Status indicators */
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-active {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        .status-inactive {
            background: #6c757d;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 ARI Robot Control</h1>
            <p>Advanced camera & motion control interface</p>
        </div>

        <!-- Joystick Control Section -->
        <div class="section">
            <div class="section-title">🕹️ Movement Control</div>
            <div class="joystick-container">
                <div class="joystick-area" id="joystickArea">
                    <div class="joystick-knob" id="joystickKnob"></div>
                </div>
            </div>
        </div>

        <!-- ARI Control Section -->
        <div class="section">
            <div class="section-title">💬 Voice Command</div>
            <input type="text" class="text-input" id="textInput" placeholder="Enter command for ARI...">
            <button class="send-btn" onclick="sendCommand()">Send to ARI</button>
            
            <div class="motion-buttons">
                <button class="motion-btn" onclick="performMotion('wave')">👋 Wave</button>
                <button class="motion-btn" onclick="performMotion('nod')">👤 Nod</button>
                <button class="motion-btn" onclick="performMotion('look_around')">👀 Look Around</button>
                <button class="motion-btn" onclick="performMotion('gesture')">✋ Gesture</button>
            </div>
        </div>

        <!-- Camera Preview Section -->
        <div class="section">
            <div class="section-title">📹 Camera Preview</div>
            <div class="camera-preview">
                <div class="preview-container">
                    <div class="preview-placeholder" id="previewPlaceholder">
                        Camera feed will appear here
                    </div>
                    <img class="preview-feed" id="previewFeed" style="display: none;">
                </div>
                <div class="preview-controls">
                    <button class="preview-btn start-preview" onclick="startPreview()">Start Preview</button>
                    <button class="preview-btn stop-preview" onclick="stopPreview()">Stop Preview</button>
                </div>
            </div>
        </div>

                <!-- Remote Selfie Section -->
        <div class="section">
            <div class="section-title">📸 Remote Selfie</div>
            <button class="nav-btn selfie" onclick="startRemoteSelfie()">📷 Take Remote Selfie</button>
            <div id="remote-status" style="margin-top: 15px; font-weight: bold;"></div>
            <div id="remote-preview" class="hidden" style="margin-top: 15px;">
                <img id="remote-image" style="width: 100%; border-radius: 10px;" alt="Remote Selfie">
            </div>
        </div>

        <!-- Hidden elements for flash effect -->
        <div id="flash-screen" class="flash-screen hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">
            #issobellatherobot
        </div>

        <!-- Navigation Section -->
        <div class="section">
            <div class="section-title">🧭 Navigation</div>
            <div class="nav-buttons">
                <button class="nav-btn selfie" onclick="startRemoteSelfie()">📸 Remote Selfie</button>

                <button class="nav-btn interview" onclick="navigateTo('interview')">🎤 Interview</button>
                <button class="nav-btn gallery" onclick="navigateTo('gallery')">🖼️ Gallery</button>
                <button class="nav-btn home" onclick="navigateTo('home')">🏠 Home</button>
            </div>
        </div>
    </div>

    <script>
        // Joystick functionality
        class VirtualJoystick {
            constructor(container, knob) {
                this.container = container;
                this.knob = knob;
                this.isDragging = false;
                this.centerX = 0;
                this.centerY = 0;
                this.currentX = 0;
                this.currentY = 0;
                this.maxDistance = 40; // Maximum distance from center
                
                this.init();
            }
            
            init() {
                // Calculate center position
                const rect = this.container.getBoundingClientRect();
                this.centerX = rect.width / 2;
                this.centerY = rect.height / 2;
                
                // Event listeners
                this.knob.addEventListener('mousedown', this.startDrag.bind(this));
                this.knob.addEventListener('touchstart', this.startDrag.bind(this));
                
                document.addEventListener('mousemove', this.drag.bind(this));
                document.addEventListener('touchmove', this.drag.bind(this));
                
                document.addEventListener('mouseup', this.stopDrag.bind(this));
                document.addEventListener('touchend', this.stopDrag.bind(this));
                
                // Container click to move knob
                this.container.addEventListener('click', this.moveToClick.bind(this));
                
                // Prevent context menu
                this.container.addEventListener('contextmenu', e => e.preventDefault());
            }
            
            startDrag(e) {
                this.isDragging = true;
                this.knob.style.transition = 'none';
                e.preventDefault();
            }
            
            drag(e) {
                if (!this.isDragging) return;
                
                const rect = this.container.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = clientX - rect.left - this.centerX;
                const y = clientY - rect.top - this.centerY;
                
                this.updatePosition(x, y);
                e.preventDefault();
            }
            
            stopDrag() {
                if (!this.isDragging) return;
                this.isDragging = false;
                this.knob.style.transition = 'all 0.2s ease-out';
                this.returnToCenter();
            }
            
            moveToClick(e) {
                if (this.isDragging) return;
                
                const rect = this.container.getBoundingClientRect();
                const x = e.clientX - rect.left - this.centerX;
                const y = e.clientY - rect.top - this.centerY;
                
                this.knob.style.transition = 'all 0.2s ease-out';
                this.updatePosition(x, y);
                
                // Return to center after a short delay
                setTimeout(() => this.returnToCenter(), 200);
            }
            
            updatePosition(x, y) {
                const distance = Math.sqrt(x * x + y * y);
                
                if (distance > this.maxDistance) {
                    const angle = Math.atan2(y, x);
                    x = Math.cos(angle) * this.maxDistance;
                    y = Math.sin(angle) * this.maxDistance;
                }
                
                this.currentX = x;
                this.currentY = y;
                
                this.knob.style.transform = `translate(${x - 20}px, ${y - 20}px)`;
                
                // Send joystick data to server (removed value display)
                const normalizedX = x / this.maxDistance;
                const normalizedY = -y / this.maxDistance; // Invert Y for intuitive up/down
                
                this.sendJoystickData(normalizedX, normalizedY);
            }
            
            returnToCenter() {
                this.currentX = 0;
                this.currentY = 0;
                this.knob.style.transform = 'translate(-50%, -50%)';
                
                // Send stop command
                this.sendJoystickData(0, 0);
            }
            
            sendJoystickData(x, y) {
                // Send data to your Flask server
                fetch('/api/joystick', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        x: x,
                        y: y,
                        timestamp: Date.now()
                    })
                }).catch(err => console.log('Joystick data send failed:', err));
            }
        }
        
        // Initialize joystick when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const joystickArea = document.getElementById('joystickArea');
            const joystickKnob = document.getElementById('joystickKnob');
            new VirtualJoystick(joystickArea, joystickKnob);
        });
        
        // Existing functions (you can adapt these to your Flask routes)
        function sendCommand() {
            const text = document.getElementById('textInput').value;
            if (text.trim()) {
                fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: text })
                });
                document.getElementById('textInput').value = '';
            }
        }
        
        function performMotion(motionType) {
            fetch('/api/motion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ motion: motionType })
            });
        }
        
        function startPreview() {
            fetch('/api/camera/start', { method: 'POST' });
        }
        
        function stopPreview() {
            fetch('/api/camera/stop', { method: 'POST' });
        }
        
        function navigateTo(page) {
            window.location.href = `/${page}`;
        }
        // Replace the selfie button onclick
        function startRemoteSelfie() {
            const status = document.getElementById('remote-status');
            const flashScreen = document.getElementById('flash-screen');
            
            status.textContent = 'Starting remote selfie countdown...';
            
            // Show countdown on admin screen
            let count = 6;
            status.textContent = 'Get ready... ' + count;
            
            const countdownInterval = setInterval(() => {
                if (count > 1) {
                    count--;
                    status.textContent = 'Get ready... ' + count;
                } else {
                    clearInterval(countdownInterval);
                    status.textContent = 'Taking selfie...';
                    
                    // Show flash on admin screen
                    flashScreen.classList.remove('hidden');
                    
                    setTimeout(() => {
                        takeRemoteSelfie();
                        flashScreen.classList.add('hidden');
                    }, 1000);
                }
            }, 1000);
        }

        async function takeRemoteSelfie() {
            const status = document.getElementById('remote-status');
            const previewContainer = document.getElementById('remote-preview');
            const previewImage = document.getElementById('remote-image');
            
            try {
                const response = await fetch('/api/take_selfie', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    status.textContent = 'Remote selfie captured successfully!';
                    
                    // Show preview on admin screen
                    previewImage.src = `/gallery/${result.filename}`;
                    previewContainer.classList.remove('hidden');
                    
                } else {
                    status.textContent = `Error: ${result.error}`;
                }
                
            } catch (error) {
                status.textContent = `Error: ${error.message}`;
            }
        }
        // Allow Enter key to send command
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('textInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendCommand();
                }
            });
        });
    </script>
</body>
</html>
