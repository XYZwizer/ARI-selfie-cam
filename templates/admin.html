<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - Camera & ARI Robot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
        }

        /* ARI Control Section */
        .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .motion-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .motion-btn {
            padding: 12px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .motion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* Camera Preview Section */
        .camera-preview {
            text-align: center;
            margin-bottom: 15px;
        }

        .preview-container {
            width: 100%;
            height: 240px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            border: 3px solid #667eea;
        }

        .preview-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 16px;
        }

        .preview-controls {
            display: flex;
            gap: 10px;
        }

        .preview-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-preview {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
        }

        .stop-preview {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
        }

        /* Navigation Section */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .nav-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .nav-btn.selfie {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
        }

        .nav-btn.interview {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }

        .nav-btn.gallery {
            background: linear-gradient(45deg, #feca57, #ff9ff3);
        }

        .nav-btn.home {
            background: linear-gradient(45deg, #5f27cd, #341f97);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Status indicators */
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-active {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        .status-inactive {
            background: #6c757d;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }
            
            .motion-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Admin Control</h1>
            <p>Camera & ARI Robot Management</p>
        </div>

        <!-- Alert messages -->
        <div id="alert" class="alert"></div>

        <!-- ARI Robot Control -->
        <div class="section">
            <div class="section-title">🗣️ ARI Robot Speech</div>
            <textarea id="speechText" class="text-input" rows="3" placeholder="Enter text for ARI to speak..."></textarea>
            <button onclick="sendSpeech()" class="send-btn">
                <span id="speechStatus">📢 Send to ARI</span>
            </button>
            
            <div class="section-title" style="margin-top: 20px;">🤖 ARI Motions</div>
            <div class="motion-buttons">
                <button onclick="sendMotion('wave_hello')" class="motion-btn">👋 Wave Hello</button>
                <button onclick="sendMotion('shake_left')" class="motion-btn">👈 Shake Left</button>
                <button onclick="sendMotion('nod_yes')" class="motion-btn">✅ Nod Yes</button>
                <button onclick="sendMotion('shake_no')" class="motion-btn">❌ Shake No</button>
            </div>
        </div>

        <!-- Camera Preview -->
        <div class="section">
            <div class="section-title">📹 Camera Preview</div>
            <div class="camera-preview">
                <div class="preview-container">
                    <img id="previewFeed" class="preview-feed" style="display: none;" src="">
                    <div id="previewPlaceholder" class="preview-placeholder">
                        Click "Start Preview" to see camera feed
                    </div>
                </div>
                <div class="preview-controls">
                    <button onclick="startPreview()" class="preview-btn start-preview">▶️ Start Preview</button>
                    <button onclick="stopPreview()" class="preview-btn stop-preview">⏹️ Stop Preview</button>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section">
            <div class="section-title">
                📸 Quick Actions
                <span id="recordingStatus" class="status-indicator status-inactive"></span>
            </div>
            <div class="nav-buttons">
                <button onclick="takeSelfie()" class="nav-btn selfie">📷 Take Selfie</button>
                <button onclick="toggleInterview()" id="interviewBtn" class="nav-btn interview">🎥 Start Interview</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="section">
            <div class="section-title">🧭 Navigation</div>
            <div class="nav-buttons">
                <button onclick="goToPage('/')" class="nav-btn home">🏠 Home</button>
                <button onclick="goToPage('/gallery')" class="nav-btn gallery">🖼️ Gallery</button>
            </div>
        </div>

        <!-- System Status -->
        <div class="section">
            <div class="section-title">⚡ System Status</div>
            <div id="systemStatus">
                <p><span id="cameraStatus" class="status-indicator status-inactive"></span>Cameras: Loading...</p>
                <p><span id="previewStatusIndicator" class="status-indicator status-inactive"></span>Preview: Inactive</p>
                <p><span id="recordingStatusIndicator" class="status-indicator status-inactive"></span>Recording: Inactive</p>
            </div>
        </div>
    </div>

    <script>
        let isRecording = false;
        let previewActive = false;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus();
            setInterval(updateStatus, 2000); // Update status every 2 seconds
        });

        // Show alert messages
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // ARI Robot Functions
        async function sendSpeech() {
            const text = document.getElementById('speechText').value.trim();
            if (!text) {
                showAlert('Please enter some text first!', 'error');
                return;
            }

            const statusBtn = document.getElementById('speechStatus');
            statusBtn.textContent = '🔄 Sending...';
            
            try {
                const response = await fetch('/api/admin/ari_speak', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        lang_id: 'en_GB'
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    showAlert('✅ Speech sent to ARI successfully!', 'success');
                    document.getElementById('speechText').value = '';
                } else {
                    showAlert(`❌ Error: ${result.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Connection error: ${error.message}`, 'error');
            }
            
            statusBtn.textContent = '📢 Send to ARI';
        }

        async function sendMotion(motionName) {
            try {
                const response = await fetch('/api/admin/ari_motion', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        motion: motionName
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    showAlert(`✅ Motion "${motionName}" sent to ARI!`, 'success');
                } else {
                    showAlert(`❌ Motion error: ${result.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Connection error: ${error.message}`, 'error');
            }
        }

        // Camera Preview Functions
        async function startPreview() {
            try {
                const response = await fetch('/api/admin/start_preview', {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    const feed = document.getElementById('previewFeed');
                    const placeholder = document.getElementById('previewPlaceholder');
                    
                    feed.src = `/admin/camera_feed?t=${Date.now()}`;
                    feed.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    previewActive = true;
                    showAlert('✅ Camera preview started!', 'success');
                } else {
                    showAlert(`❌ Preview error: ${result.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Connection error: ${error.message}`, 'error');
            }
        }

        async function stopPreview() {
            try {
                const response = await fetch('/api/admin/stop_preview', {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    const feed = document.getElementById('previewFeed');
                    const placeholder = document.getElementById('previewPlaceholder');
                    
                    feed.style.display = 'none';
                    feed.src = '';
                    placeholder.style.display = 'flex';
                    placeholder.textContent = 'Click "Start Preview" to see camera feed';
                    
                    previewActive = false;
                    showAlert('✅ Camera preview stopped!', 'success');
                } else {
                    showAlert(`❌ Stop error: ${result.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Connection error: ${error.message}`, 'error');
            }
        }

        // Camera Action Functions
        async function takeSelfie() {
            try {
                const response = await fetch('/api/take_selfie', {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    showAlert(`✅ Selfie captured: ${result.filename}`, 'success');
                } else {
                    showAlert(`❌ Selfie error: ${result.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Connection error: ${error.message}`, 'error');
            }
        }

        async function toggleInterview() {
            const btn = document.getElementById('interviewBtn');
            
            if (!isRecording) {
                try {
                    const response = await fetch('/api/start_interview', {
                        method: 'POST'
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        isRecording = true;
                        btn.textContent = '⏹️ Stop Interview';
                        btn.style.background = 'linear-gradient(45deg, #dc3545, #c82333)';
                        showAlert('✅ Interview recording started!', 'success');
                    } else {
                        showAlert(`❌ Start error: ${result.error}`, 'error');
                    }
                } catch (error) {
                    showAlert(`❌ Connection error: ${error.message}`, 'error');
                }
            } else {
                try {
                    const response = await fetch('/api/stop_interview', {
                        method: 'POST'
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        isRecording = false;
                        btn.textContent = '🎥 Start Interview';
                        btn.style.background = 'linear-gradient(45deg, #4ecdc4, #44a08d)';
                        showAlert('✅ Interview recording stopped and saved!', 'success');
                    } else {
                        showAlert(`❌ Stop error: ${result.error}`, 'error');
                    }
                } catch (error) {
                    showAlert(`❌ Connection error: ${error.message}`, 'error');
                }
            }
        }

        // Navigation Functions
        function goToPage(url) {
            window.location.href = url;
        }

        // Status Update Function
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                
                // Update camera status
                const cameraStatus = document.getElementById('cameraStatus');
                if (status.csi_camera && status.uvc_camera) {
                    cameraStatus.className = 'status-indicator status-active';
                    cameraStatus.nextSibling.textContent = 'Cameras: Both Available';
                } else if (status.csi_camera || status.uvc_camera) {
                    cameraStatus.className = 'status-indicator status-active';
                    cameraStatus.nextSibling.textContent = 'Cameras: Partially Available';
                } else {
                    cameraStatus.className = 'status-indicator status-inactive';
                    cameraStatus.nextSibling.textContent = 'Cameras: Not Available';
                }

                // Update preview status
                const previewStatus = document.getElementById('previewStatusIndicator');
                if (status.preview_active) {
                    previewStatus.className = 'status-indicator status-active';
                    previewStatus.nextSibling.textContent = 'Preview: Active';
                } else {
                    previewStatus.className = 'status-indicator status-inactive';
                    previewStatus.nextSibling.textContent = 'Preview: Inactive';
                }

                // Update recording status
                const recordingStatusIndicator = document.getElementById('recordingStatusIndicator');
                const recordingStatus = document.getElementById('recordingStatus');
                const interviewBtn = document.getElementById('interviewBtn');
                
                if (status.recording) {
                    recordingStatusIndicator.className = 'status-indicator status-active';
                    recordingStatusIndicator.nextSibling.textContent = 'Recording: Active';
                    recordingStatus.className = 'status-indicator status-active';
                    
                    if (!isRecording) {
                        isRecording = true;
                        interviewBtn.textContent = '⏹️ Stop Interview';
                        interviewBtn.style.background = 'linear-gradient(45deg, #dc3545, #c82333)';
                    }
                } else {
                    recordingStatusIndicator.className = 'status-indicator status-inactive';
                    recordingStatusIndicator.nextSibling.textContent = 'Recording: Inactive';
                    recordingStatus.className = 'status-indicator status-inactive';
                    
                    if (isRecording) {
                        isRecording = false;
                        interviewBtn.textContent = '🎥 Start Interview';
                        interviewBtn.style.background = 'linear-gradient(45deg, #4ecdc4, #44a08d)';
                    }
                }

            } catch (error) {
                console.error('Status update failed:', error);
            }
        }

        // Handle enter key in text area
        document.getElementById('speechText').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendSpeech();
            }
        });
    </script>
</body>
</html>
