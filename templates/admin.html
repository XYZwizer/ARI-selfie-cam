<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - Camera & ARI Robot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); 
            color: #333;
        }
        .flash-screen.hidden {
            display: none !important;
        }

        .remote-preview img {
            max-width: 100%;
            height: auto;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .header {
            text-align: center;
            margin-bottom: 20px; /* Reduced from 25px */
            padding-bottom: 10px; /* Reduced from 15px */
            border-bottom: 2px solid #667eea;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 10px;
            border: 2px solid #e9ecef;
        }

        .section-title {
            color: #667eea;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
        }

        /* Joystick Control Section */
        .joystick-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .joystick-area {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            border-radius: 50%;
            position: relative;
            border: 3px solid #667eea;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            user-select: none;
        }

        .joystick-knob {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            border: 2px solid #fff;
            box-shadow: 0 3px 8px rgba(255, 140, 66, 0.4);
            transition: box-shadow 0.2s;
        }

        .joystick-knob:active {
            cursor: grabbing;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.6);
        }

        /* ARI Control Section */
        .text-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 10px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .motion-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .motion-btn {
            padding: 12px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .motion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* Camera Preview Section */
        .camera-preview {
            text-align: center;
            margin-bottom: 15px;
        }

        .preview-container {
            width: 100%;
            height: 240px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            border: 3px solid #667eea;
        }

        .preview-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 16px;
        }

        .preview-controls {
            display: flex;
            gap: 10px;
        }

        .preview-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-preview {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
        }

        .stop-preview {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
        }

        /* Navigation Section */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .nav-btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .gallery-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
        }

        /* Status indicators */
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-active {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        .status-inactive {
            background: #6c757d;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .soundboard-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .soundboard-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .soundboard-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .soundboard-row .text-input {
            flex: 1;
            margin-bottom: 0;
            padding: 8px;
        }

        .soundboard-row .send-btn {
            width: auto;
            min-width: 70px;
            margin-bottom: 0;
            padding: 8px;
        }

        .gesture-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .gesture-btn {
            padding: 12px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .gesture-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .volume-control {
            margin-bottom: 15px;
        }

        .volume-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 4px;
            outline: none;
            margin: 8px 0;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .battery-status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }

        .battery-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .battery-item {
            font-size: 13px;
            color: #666;
        }

        .battery-label {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Isobella Control</h1>
            <p>Advanced camera & interview control</p>
        </div>

        <!-- Volume and Battery Section -->
        <div class="section">
            <div class="section-title">🔊 Volume & Battery</div>
            <div class="volume-control">
                <label for="volume">Volume: <span id="volumeValue">50</span>%</label>
                <input type="range" id="volume" min="0" max="100" value="50" class="volume-slider">
            </div>
            <div class="battery-status">
                <div class="battery-info">
                    <div class="battery-item">
                        <span class="battery-label">🔋 Charge:</span>
                        <span id="batteryCharge">--</span>%
                    </div>
                    <div class="battery-item">
                        <span class="battery-label">🔌 Connected:</span>
                        <span id="batteryConnected">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Soundboard Section -->
        <div class="section">
            <div class="section-title">🔊 Soundboard</div>
            <div class="soundboard-inputs">
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound1" placeholder="Sound 1" value="Sound 1">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound1').value)">Send</button>
                </div>
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound2" placeholder="Sound 2" value="Sound 2">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound2').value)">Send</button>
                </div>
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound3" placeholder="Sound 3" value="Sound 3">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound3').value)">Send</button>
                </div>
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound4" placeholder="Sound 4" value="Sound 4">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound4').value)">Send</button>
                </div>
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound5" placeholder="Sound 5" value="Sound 5">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound5').value)">Send</button>
                </div>
                <div class="soundboard-row">
                    <input type="text" class="text-input sound-input" id="sound6" placeholder="Sound 6" value="Sound 6">
                    <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound6').value)">Send</button>
                </div>
            </div>
        </div>

        <!-- Gesture Section -->
        <div class="section">
            <div class="section-title">🤖 Gestures</div>
            <div class="gesture-buttons">
                <button class="gesture-btn" onclick="sendAriMotion('wave')">👋 Wave</button>
                <button class="gesture-btn" onclick="sendAriMotion('shake_right')">🤝 Shake Right</button>
                <button class="gesture-btn" onclick="sendAriMotion('nod')">👍 Nod</button>
                <button class="gesture-btn" onclick="sendAriMotion('show_left')">👈 Show Left</button>
                <button class="gesture-btn" onclick="sendAriMotion('custom1')">✨ Custom 1</button>
                <button class="gesture-btn" onclick="sendAriMotion('custom2')">✨ Custom 2</button>
            </div>
        </div>

        <!-- Interview Section -->
        <div class="section">
            <div class="section-title">🎤 Interview Control</div>
            <input type="text" class="text-input" id="interviewInput" placeholder="Enter interview prompt...">
            <div class="interview-controls" style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="send-btn" onclick="sendInterviewPrompt()">Send Prompt</button>
                <button class="send-btn" onclick="remoteStartInterview()">Start Interview</button>
                <button class="send-btn" style="background: linear-gradient(45deg, #dc3545, #c82333);" onclick="remoteStopInterview()">Stop Interview</button>
            </div>
            <div id="interviewStatus" style="margin-top: 10px; font-size: 13px; color: #666;"></div>
        </div>

        <!-- Navigation Section -->
        <div class="section">
            <div class="section-title">🧭 Navigation</div>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">🏠 Home</a>
                <a href="/admin-gallery" class="nav-btn gallery-btn">🖼️ Admin Gallery</a>
            </div>
        </div>
    </div>

    <script>
    function sendAriTTS(text) {
        fetch('/api/admin/ari_speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });
    }

    // Add keyboard event listeners for all sound inputs
    document.querySelectorAll('.sound-input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendAriTTS(this.value);
            }
        });
    });

    async function sendInterviewPrompt() {
        const input = document.getElementById('interviewInput');
        const text = input.value.trim();
        if (!text) return;
        
        const status = document.getElementById('interviewStatus');
        status.textContent = 'Sending prompt...';
        
        try {
            // Send to ARI TTS
            sendAriTTS(text);
            
            // Send to interview prompt endpoint
            const response = await fetch('/api/interview_prompt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            
            if (response.ok) {
                status.textContent = 'Prompt sent successfully!';
                input.value = '';
            } else {
                throw new Error('Failed to send prompt');
            }
        } catch (error) {
            status.textContent = `Error: ${error.message}`;
        }
    }

    async function remoteStartInterview() {
        const status = document.getElementById('interviewStatus');
        status.textContent = 'Sending start command...';
        
        try {
            const response = await fetch('/api/interview_events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'start_interview' })
            });
            
            if (response.ok) {
                status.textContent = 'Start command sent!';
            } else {
                throw new Error('Failed to send start command');
            }
        } catch (error) {
            status.textContent = `Error: ${error.message}`;
        }
    }

    async function remoteStopInterview() {
        const status = document.getElementById('interviewStatus');
        status.textContent = 'Sending stop command...';
        
        try {
            const response = await fetch('/api/interview_events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'stop_interview' })
            });
            
            if (response.ok) {
                status.textContent = 'Stop command sent!';
            } else {
                throw new Error('Failed to send stop command');
            }
        } catch (error) {
            status.textContent = `Error: ${error.message}`;
        }
    }

    // Save soundboard settings to localStorage
    function saveSoundboardSettings() {
        const sounds = {};
        document.querySelectorAll('.sound-input').forEach(input => {
            sounds[input.id] = input.value;
        });
        localStorage.setItem('soundboardSettings', JSON.stringify(sounds));
    }

    // Load soundboard settings from localStorage
    function loadSoundboardSettings() {
        const savedSettings = localStorage.getItem('soundboardSettings');
        if (savedSettings) {
            const sounds = JSON.parse(savedSettings);
            Object.entries(sounds).forEach(([id, value]) => {
                const input = document.getElementById(id);
                if (input) {
                    input.value = value;
                }
            });
        }
    }

    // Save settings when inputs change
    document.querySelectorAll('.sound-input').forEach(input => {
        input.addEventListener('change', saveSoundboardSettings);
    });

    // Load settings when page loads
    document.addEventListener('DOMContentLoaded', loadSoundboardSettings);

    function sendAriMotion(motion) {
        fetch('/api/admin/ari_motion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ motion: motion })
        });
    }

    // Volume control
    const volumeSlider = document.getElementById('volume');
    const volumeValue = document.getElementById('volumeValue');
    
    // Get current volume
    function getCurrentVolume() {
        fetch('http://ari-0c/parameter/volume')
            .then(response => response.json())
            .then(data => {
                const currentVolume = data.value;
                volumeSlider.value = currentVolume;
                volumeValue.textContent = currentVolume;
            })
            .catch(error => console.error('Error fetching volume:', error));
    }

    // Set volume
    function setVolume(value) {
        fetch('http://ari-0c/parameter/volume', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: parseInt(value) })
        })
        .catch(error => console.error('Error setting volume:', error));
    }
    
    volumeSlider.addEventListener('input', function() {
        volumeValue.textContent = this.value;
    });

    volumeSlider.addEventListener('change', function() {
        setVolume(this.value);
    });

    // Get initial volume when page loads
    getCurrentVolume();

    // Battery status
    function updateBatteryStatus() {
        fetch('http://ari-Xc/topic/power_diagnostic')
            .then(response => response.json())
            .then(data => {
                const power = data.msg;
                document.getElementById('batteryCharge').textContent = Math.round(power.charge);
                document.getElementById('batteryConnected').textContent = power.is_connected ? 'Yes' : 'No';
            })
            .catch(error => console.error('Error fetching battery status:', error));
    }

    // Update battery status every 30 seconds
    updateBatteryStatus();
    setInterval(updateBatteryStatus, 30000);
    </script>
</body>
</html>
