<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - Camera &amp; ARI Robot</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>🤖 Isobella Control</h1>
                <div class="header-battery">
                    <span class="battery-label">🔋</span><span id="batteryCharge">--</span>%
                    <span class="battery-label">🔌</span><span id="batteryDocked">--</span>
                    <span class="battery-label">⚡</span><span id="batteryVoltage">--</span>V
                    <span class="battery-label">⚠️</span><span id="emergencyState">--</span>
                </div>
            </div>
        </div>

        <div class="cols">
            <!-- LEFT COLUMN: Movement + Gestures -->
            <div class="col">
                <!-- Movement Control Section -->
                <div class="section">
                    <div class="section-title">🎮 Movement
                        <div class="title-controls">
                            <span class="ctrl-label">Lock</span>
                            <label class="switch">
                                <input type="checkbox" id="movementLock">
                                <span class="slider round"></span>
                            </label>
                            <span class="ctrl-label">Speed</span>
                            <label class="switch speed-switch">
                                <input type="checkbox" id="speedToggle">
                                <span class="slider round"></span>
                            </label>
                            <span id="speedStatus" class="ctrl-status">Slow</span>
                        </div>
                    </div>
                    <div class="joystick-container">
                        <div class="joystick-area" id="joystickArea">
                            <div class="joystick-knob" id="joystickKnob"></div>
                        </div>
                    </div>
                    <div id="joystickStatus" class="status-text">Disconnected</div>
                </div>

                <!-- Gesture Section -->
                <div class="section">
                    <div class="section-title">🤖 Gestures</div>
                    <div class="gesture-buttons">
                        <button class="gesture-btn" onclick="sendAriMotion('wave')">👋 Wave</button>
                        <button class="gesture-btn" onclick="sendAriMotion('shake_right')">🤝 Shake</button>
                        <button class="gesture-btn" onclick="sendAriMotion('nod')">👍 Nod</button>
                        <button class="gesture-btn" onclick="sendAriMotion('show_left')">👈 Show L</button>
                        <button class="gesture-btn" onclick="sendAriMotion('custom1')">✨ Custom 1</button>
                        <button class="gesture-btn" onclick="sendAriMotion('custom2')">✨ Custom 2</button>
                    </div>
                </div>

                <!-- Navigation Section
                <div class="section">
                    <div class="section-title">🧭 Navigation</div>
                    <div class="nav-buttons">
                        <a href="/" class="nav-btn">🏠 Home</a>
                        <a href="/admin-gallery" class="nav-btn gallery-btn">🖼️ Gallery</a>
                    </div>
                </div>
                -->
            </div>

            <!-- RIGHT COLUMN: Vol/Battery + Soundboard + Interview + Nav -->
            <div class="col">
                <!-- Volume Section -->
                <div class="section">
                    <div class="section-title">🔊 Volume
                        <div class="volume-inline">
                            <label for="volume"><span id="volumeValue">50</span>%</label>
                            <input type="range" id="volume" min="0" max="100" value="50" class="volume-slider">
                        </div>
                    </div>
                </div>

                <!-- Soundboard Section -->
                <div class="section">
                    <div class="section-title">
                        <span>🔊 Soundboard</span>
                        <div class="chatbot-toggle-row">
                            <span class="ctrl-label">Chatbot:</span>
                            <label class="switch chatbot-switch">
                                <input type="checkbox" id="chatbotToggle">
                                <span class="slider round"></span>
                            </label>
                            <span id="chatbotStatus" class="ctrl-status">Off</span>
                        </div>
                    </div>
                    <div class="soundboard-inputs">
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound1" placeholder="Sound 1" value="Sound 1">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound1').value)">Send</button>
                        </div>
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound2" placeholder="Sound 2" value="Sound 2">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound2').value)">Send</button>
                        </div>
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound3" placeholder="Sound 3" value="Sound 3">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound3').value)">Send</button>
                        </div>
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound4" placeholder="Sound 4" value="Sound 4">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound4').value)">Send</button>
                        </div>
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound5" placeholder="Sound 5" value="Sound 5">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound5').value)">Send</button>
                        </div>
                        <div class="soundboard-row">
                            <input type="text" class="text-input sound-input" id="sound6" placeholder="Sound 6" value="Sound 6">
                            <button class="send-btn" onclick="sendAriTTS(document.getElementById('sound6').value)">Send</button>
                        </div>
                    </div>
                </div>

                <!-- Interview Section
                <div class="section">
                    <div class="section-title">🎤 Interview</div>
                    <input type="text" class="text-input" id="interviewInput" placeholder="Enter interview prompt...">
                    <div class="interview-controls">
                        <button class="send-btn" onclick="sendInterviewPrompt()">Send</button>
                        <button class="send-btn" onclick="remoteStartInterview()">Start</button>
                        <button class="send-btn stop-btn" onclick="remoteStopInterview()">Stop</button>
                    </div>
                    <div id="interviewStatus" class="status-text"></div>
                </div>
                 -->
            </div>
        </div>
    </div>
</body>
</html>
